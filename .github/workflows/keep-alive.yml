name: Keep HF Space Alive

on:
  schedule:
    - cron: '0 0 * * *'   # runs every 24 hours at midnight UTC
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          echo "Pinging https://raghav-1729-portfolio.hf.space/health ..."
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://raghav-1729-portfolio.hf.space/health)
          echo "Response status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "Space is alive."
          else
            echo "Unexpected status code: $STATUS"
            exit 1
          fi
